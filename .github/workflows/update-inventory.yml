name: Update OurBox inventory

on:
  workflow_dispatch:
  schedule:
    - cron: '10 6 * * *'

permissions:
  contents: write

jobs:
  update-inventory:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch latest inventory
        shell: pwsh
        env:
          OURBOX_API_ACCESS_KEY: ${{ secrets.OURBOX_API_ACCESS_KEY }}
          OURBOX_API_SECRET_KEY: ${{ secrets.OURBOX_API_SECRET_KEY }}
        run: ./scripts/update-inventory.ps1

      - name: Commit inventory snapshot
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inventory-latest.json
          if (git diff --cached --quiet) {
            Write-Host "No inventory changes."
          } else {
            git commit -m "chore: update inventory snapshot"
            git push
          }
