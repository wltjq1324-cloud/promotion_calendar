<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SKU별 재고현황</title>
  <style>
    :root{--bg:#f6f7f9;--panel:#fff;--ink:#17202a;--muted:#667085;--line:#d8dee8;--soft:#eef2f7;--brand:#176b87;--brand-dark:#0f4f63;--green:#18864b;--orange:#c56514;--red:#b42318;--shadow:0 14px 40px rgba(15,23,42,.08)}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px}
    button,input,select{font:inherit}
    .app{min-height:100vh;padding:24px}
    .topbar{display:grid;grid-template-columns:minmax(280px,1fr) auto;gap:16px;align-items:end;margin-bottom:18px}
    .eyebrow{margin:0 0 6px;color:var(--brand-dark);font-size:13px;font-weight:900}
    h1{margin:0;font-size:clamp(25px,3vw,38px);line-height:1.1}
    .subcopy{margin:10px 0 0;color:var(--muted);line-height:1.5}
    .controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;align-items:center}
    .pill,.button{border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);min-height:38px;padding:8px 12px;font-weight:800}
    .button{cursor:pointer}.button.primary{border-color:var(--brand);background:var(--brand);color:#fff}.button:hover{background:var(--soft)}
    .summary{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:14px}
    .metric{border:1px solid var(--line);border-radius:8px;background:#fff;padding:12px 14px;box-shadow:var(--shadow)}
    .metric span{display:block;color:var(--muted);font-size:11px;font-weight:900}.metric strong{display:block;margin-top:6px;font-size:22px;color:var(--brand-dark)}
    .toolbar{display:grid;grid-template-columns:2fr repeat(4,minmax(130px,1fr)) auto;gap:10px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
    label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:900}
    input,select{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:9px 10px}
    .checks{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:14px;color:var(--muted);font-weight:800}.checks label{display:flex;grid-auto-flow:column;align-items:center;gap:6px}.checks input{width:auto}
    .table-wrap{max-height:68vh;overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:var(--shadow)}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;vertical-align:top;white-space:nowrap}
    th{position:sticky;top:0;z-index:1;background:#eef6f8;color:var(--brand-dark);font-weight:900;cursor:pointer;user-select:none}
    td.product{white-space:normal;min-width:300px;font-weight:900}td.product small{display:block;margin-top:4px;color:var(--muted);font-weight:700;line-height:1.35}
    .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:900}.muted{color:var(--muted)}
    .badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900;background:#eef2f7;color:var(--muted)}
    .badge.good{background:#eaf7ee;color:var(--green)}.badge.warn{background:#fff7ed;color:var(--orange)}.badge.bad,.badge.critical{background:#fff1f0;color:var(--red)}.badge.review{background:#fff7ed;color:var(--orange)}.badge.neutral{background:#eef2f7;color:var(--muted)}
    tr.risk td{background:#fff6f6}tr.unmapped td{background:#fafafa;color:#667085}
    .mapping-alert{display:none;border:1px solid #f3c7c0;border-radius:8px;background:#fff7f6;color:var(--red);padding:12px 14px;margin-bottom:14px;font-size:12px;font-weight:800;line-height:1.5;box-shadow:var(--shadow)}
    .mapping-alert.ok{border-color:#badbcc;background:#f0f9f3;color:var(--green)}
    .mapping-alert strong{font-weight:900}.mapping-alert small{display:block;margin-top:4px;color:var(--muted);font-weight:700}
    .empty{display:none;padding:32px;text-align:center;color:var(--muted);font-weight:900;background:#fff}
    .gate{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.52);padding:20px}
    .gate-box{width:min(420px,100%);background:#fff;border-radius:12px;box-shadow:0 24px 80px rgba(15,23,42,.28);padding:24px}
    .gate-box h2{margin:0 0 8px}.gate-box p{margin:0 0 16px;color:var(--muted);line-height:1.5}.gate-row{display:flex;gap:8px}.error{display:none;margin-top:10px;color:var(--red);font-weight:900}
    .loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:8px;padding:22px 32px;box-shadow:var(--shadow);font-weight:900;color:var(--brand-dark)}
    @media(max-width:1100px){.topbar{grid-template-columns:1fr}.controls{justify-content:flex-start}.summary{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr 1fr}.button{width:100%}}
    @media(max-width:640px){.app{padding:16px}.summary,.toolbar{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="gate" id="accessGate">
  <div class="gate-box">
    <h2>접속 코드 입력</h2>
    <p>프로모션 캘린더와 같은 권한 코드로 재고 회전 테스트 화면을 확인합니다.</p>
    <div class="gate-row"><input id="accessCodeInput" type="password" placeholder="접속 코드"><button class="button primary" id="accessCodeButton" type="button">확인</button></div>
    <div class="error" id="accessError">접속 코드가 올바르지 않습니다.</div>
  </div>
</div>
<div class="loading" id="loading" style="display:none">데이터 불러오는 중...</div>
<main class="app" id="mainApp" style="display:none">
  <section class="topbar">
    <div>
      <p class="eyebrow">OURBOX INVENTORY OPS</p>
      <h1>SKU별 재고 현황</h1>
      <p class="subcopy" id="subtitle">최근 7/14/30일 출고량과 14일 일평균 기준 21일 필요 재고를 비교합니다.</p>
    </div>
    <div class="controls">
      <span class="pill" id="roleLabel">-</span>
      <span class="pill" id="updatedLabel">-</span>
      <button class="button primary" id="refreshButton" type="button">새로고침</button>
      <button class="button" id="changeAccessButton" type="button">권한 변경</button>
    </div>
  </section>
  <section class="summary">
    <div class="metric"><span>표시 SKU</span><strong id="visibleCount">0개</strong></div>
    <div class="metric"><span>가용 재고</span><strong id="availableTotal">0</strong></div>
    <div class="metric"><span>21일 미만</span><strong id="riskCount">0개</strong></div>
    <div class="metric"><span>출고 매핑 없음</span><strong id="unmappedCount">0개</strong></div>
    <div class="metric"><span>대시보드 최신일</span><strong id="velocityDate">-</strong></div>
  </section>
  <section class="mapping-alert" id="mappingAlert"></section>
  <section class="toolbar">
    <label>검색<input id="searchInput" placeholder="상품명, 상품코드, 업체 품목코드, 매핑 상품명"></label>
    <label>재고 상태<select id="stockFilter"><option value="all">전체</option><option value="risk21">21일 미만</option><option value="unmapped">출고 매핑 없음</option><option value="low">100개 미만</option><option value="out">품절</option><option value="in">재고 있음</option></select></label>
    <label>구분<select id="categoryFilter"><option value="all">전체</option><option value="판매상품">판매상품</option><option value="증정품">증정품</option><option value="부자재">부자재</option><option value="세트">세트</option></select></label>
    <label>센터<select id="centerFilter"><option value="all">전체</option></select></label>
    <label>정렬<select id="sortSelect"><option value="days_left:asc">잔여일 적은순</option><option value="available_stock:asc">가용 적은순</option><option value="recent14_qty:desc">14일 출고 많은순</option><option value="recent30_qty:desc">30일 출고 많은순</option></select></label>
    <button class="button" id="resetButton" type="button">필터 초기화</button>
    <div class="checks">
      <label><input id="hideMaterial" type="checkbox" checked> 부자재 제외</label>
      <label><input id="promoOnly" type="checkbox"> 현재 달 프로모션 품목만</label>
      <label><input id="reviewOnly" type="checkbox"> 검토 필요만</label>
    </div>
  </section>
  <section class="table-wrap">
    <table>
      <thead><tr>
        <th data-sort="category">구분</th><th data-sort="product_name">상품명</th><th data-sort="product_code">상품코드</th><th data-sort="company_code">업체 품목코드</th><th data-sort="center">센터</th><th data-sort="expiration_date">최소 소비기한</th><th data-sort="available_stock">가용</th><th data-sort="allocated_stock">할당</th><th data-sort="recent7_qty">7일 출고</th><th data-sort="recent14_qty">14일 출고</th><th data-sort="recent30_qty">30일 출고</th><th data-sort="avg14_daily">일평균</th><th data-sort="days_left">잔여일</th><th>발주 신호</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty" id="empty">조건에 맞는 SKU가 없습니다.</div>
  </section>
</main>
<script>
const API = 'https://script.google.com/macros/s/AKfycbwama99AMKAZK_vxJkFf7PnxyTgd0t_INjMheflr2oR3zIoCeSQAoedsr9XlUWaipGFPw/exec';
const INVENTORY_URL = 'inventory-latest.json';
const DASHBOARD_CACHE_URL = 'https://script.google.com/macros/s/AKfycbwi5lQEGI8caIRxVmJWKPaad0G07cAKWkXF52YYzpKJhJ2dV21QggZ1jdx3nxHP-eCpNQ/exec?mode=cache';
const SKU_MAPPING_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1FGxRu59DL7SMB4siYE_IZiTU5rNrHWefIeI9e_Hqazs/gviz/tq?tqx=out:csv&sheet=sku_mapping';
const ACCESS_CODES = {'batt1204':'edit','batt1111':'internal','ourbox123':'external'};
const ROLE_LABELS = {edit:'편집 권한: MD/마케팅',internal:'뷰어 권한: 회사 임직원',external:'부분뷰어 권한: 3PL 물류센터'};
const EXTERNAL_HIDDEN_OWNERS = ['김슬기'];
const INLINE_SKU_MAPPING = [];
let ROLE = localStorage.getItem('ourboxCalendarRole') || '';
let state = {inventory:[],promotions:[],skuMappings:[],salesVelocity:new Map(),summaryRows:[],inventoryUpdatedAt:'',velocityLatestDate:'',mappingSource:'sku_mapping',mappingRows:0,mappingLoadError:'',unmappedProducts:[],sortKey:'days_left',sortDir:'asc'};
const $ = id => document.getElementById(id);
const num = v => Number(v||0).toLocaleString('ko-KR');
function toKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function parseKey(k){const [y,m,d]=String(k).split('-').map(Number);return new Date(y,m-1,d)}
function normText(v){return String(v||'').toLowerCase().replace(/\[[^\]]+\]/g,'').replace(/감자밭|밭\(주\)|파머스베이크샵/g,'').replace(/[^0-9a-z가-힣]/g,'')}
function normSkuName(v){return normText(v).replace(/감자빵/g,'').replace(/군고구마빵/g,'군고구마').replace(/초당옥수수빵/g,'초당옥수수').replace(/옥수수빵/g,'옥수수')}
function inventoryCategory(item){const hay=[item.product_name,item.product_code,item.company_code,item.category].join(' ');if(/부자재|박스|아이스팩|테이프|스티커|봉투|완충|포장/.test(hay))return '부자재';if(/증정|사은|gift/i.test(hay))return '증정품';if(/세트|set/i.test(hay))return '세트';return '판매상품'}
function parseSku(str){if(!str)return [];try{const j=JSON.parse(str);if(Array.isArray(j))return j.filter(r=>r&&Array.isArray(r.items))}catch(e){}return [{items:[String(str)],qty:0}]}
function parseCsvLine(line){const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const ch=line[i],next=line[i+1];if(ch==='"'&&q&&next==='"'){cur+='"';i++;continue}if(ch==='"'){q=!q;continue}if(ch===','&&!q){out.push(cur);cur='';continue}cur+=ch}out.push(cur);return out}
function mappingProductNames(row){const names=[];for(let i=1;i<=6;i++){if(row[`inventory_product_name_${i}`])names.push(row[`inventory_product_name_${i}`])}if(!names.length&&row.inventory_product_name)names.push(...splitInventoryProductNames(row.inventory_product_name));return names.map(v=>String(v||'').trim()).filter(Boolean)}
function parseMappingCsv(text){const lines=String(text||'').trim().split(/\r?\n/).filter(Boolean);if(lines.length<2)return [];const headers=parseCsvLine(lines[0]).map(h=>h.trim());return lines.slice(1).map(line=>{const cells=parseCsvLine(line),row={};headers.forEach((h,i)=>row[h]=cells[i]||'');const inventory_product_names=mappingProductNames(row);return {dashboard_product:row.dashboard_product||'',dashboard_component:row.dashboard_component||row.standard_product_name||row.dashboard_product||'',standard_product_name:row.standard_product_name||'',product_type:row.product_type||'',inventory_product_code:row.inventory_product_code||'',company_code:row.company_code||'',inventory_product_name:row.inventory_product_name||'',inventory_product_names,component_qty:Number(row.component_qty)||1,match_type:row.match_type||'sheet',confidence:row.confidence||'',needs_review:String(row.needs_review).toUpperCase()==='TRUE'}}).filter(r=>r.dashboard_product&&(r.inventory_product_code||r.inventory_product_name||r.inventory_product_names.length))}
async function loadSkuMapping(){state.mappingLoadError='';const res=await fetch(`${SKU_MAPPING_SHEET_CSV_URL}&t=${Date.now()}`,{cache:'no-store'});if(!res.ok)throw new Error(`sku_mapping 시트 접근 실패: HTTP ${res.status}`);const text=await res.text();const sheetRows=parseMappingCsv(text);if(!sheetRows.length)throw new Error('sku_mapping 시트에서 사용 가능한 매핑 행을 찾지 못했습니다. inventory_product_name_1~6 값을 확인하세요.');state.mappingSource='sku_mapping';state.mappingRows=sheetRows.length;const seen=new Set();state.skuMappings=sheetRows.filter(r=>{const key=normSkuName(r.dashboard_product)+'|'+(r.inventory_product_code||r.inventory_product_names?.map(normSkuName).join('|')||normSkuName(r.inventory_product_name));if(seen.has(key))return false;seen.add(key);return true})}
function splitInventoryProductNames(value){return String(value||'').split(/[,，\x0a\x0d]/).map(v=>v.trim()).filter(Boolean)}
function inventoryLookupByName(name){const n=normSkuName(name);if(!n)return null;const exact=state.inventory.find(item=>normSkuName(item.product_name)===n);if(exact)return exact;return state.inventory.find(item=>{const p=normSkuName(item.product_name);return p&&(p.includes(n)||n.includes(p))})||null}
function expandMappingRows(rows){const expanded=[];rows.forEach(row=>{const names=row.inventory_product_names?.length?row.inventory_product_names:splitInventoryProductNames(row.inventory_product_name);if(names.length||!row.inventory_product_code){const counts=new Map();names.forEach(name=>counts.set(name,(counts.get(name)||0)+1));counts.forEach((count,name)=>{const found=inventoryLookupByName(name);if(found){expanded.push({...row,inventory_product_code:found.product_code,company_code:found.company_code||row.company_code,inventory_product_name:found.product_name,component_qty:count,match_type:row.match_type==='sheet'?'sheet_name_slots':row.match_type,needs_review:row.needs_review||!row.inventory_product_code})}else{expanded.push({...row,inventory_product_name:name,inventory_product_code:'',component_qty:count,needs_review:true})}})}else expanded.push(row)});return expanded}
function findSkuMappings(productName){const n=normSkuName(productName);if(!n)return [];const rows=state.skuMappings.filter(m=>normSkuName(m.dashboard_product)===n||normSkuName(m.dashboard_component)===n);return expandMappingRows(rows)}
function dateKeyFromDays(base,days){const d=parseKey(base);d.setDate(d.getDate()-days+1);return toKey(d)}
async function loadSalesVelocity(){await loadSkuMapping();const res=await fetch(`${DASHBOARD_CACHE_URL}&t=${Date.now()}`,{cache:'no-store'});if(!res.ok)throw new Error('대시보드 출고 캐시를 불러오지 못했습니다.');const data=await res.json();const rows=(data.dashboardCache&&Array.isArray(data.dashboardCache.productRows))?data.dashboardCache.productRows:[];const latest=rows.map(r=>r.date).filter(Boolean).sort().at(-1)||'';state.velocityLatestDate=latest;const s7=dateKeyFromDays(latest,7),s14=dateKeyFromDays(latest,14),s30=dateKeyFromDays(latest,30),acc=new Map(),unmapped=new Map();rows.forEach(r=>{if(!r.date||r.date<s30||!r.product)return;const mappings=findSkuMappings(r.product);if(!mappings.length){const u=unmapped.get(r.product)||{product:r.product,recent7_qty:0,recent14_qty:0,recent30_qty:0};const qty=Number(r.qty)||0;if(r.date>=s7)u.recent7_qty+=qty;if(r.date>=s14)u.recent14_qty+=qty;u.recent30_qty+=qty;unmapped.set(r.product,u);return}mappings.forEach(m=>{const code=m.inventory_product_code;if(!code)return;if(!acc.has(code))acc.set(code,{recent7_qty:0,recent14_qty:0,recent30_qty:0,mapped_products:new Set(),needs_review:false});const item=acc.get(code),qty=(Number(r.qty)||0)*(Number(m.component_qty)||1);if(r.date>=s7)item.recent7_qty+=qty;if(r.date>=s14)item.recent14_qty+=qty;item.recent30_qty+=qty;item.mapped_products.add(r.product);if(m.needs_review)item.needs_review=true})});acc.forEach(v=>{v.avg14_daily=v.recent14_qty/14;v.mapped_products=[...v.mapped_products].slice(0,8).join(', ')});state.salesVelocity=acc;state.unmappedProducts=[...unmapped.values()].sort((a,b)=>b.recent30_qty-a.recent30_qty)}
async function loadInventory(){const res=await fetch(`${INVENTORY_URL}?t=${Date.now()}`,{cache:'no-store'});if(!res.ok)throw new Error('재고 파일을 불러오지 못했습니다.');const data=await res.json();state.inventory=(Array.isArray(data.items)?data.items:[]).map(row=>({center:row.center||row.plant_name||'',product_code:row.product_code||row.sales_product_code||'',company_code:row.company_code||row.sales_product_company_code||'',product_name:row.product_name||'',barcode:row.barcode||'',expiration_date:row.expiration_date||'',lot_no:row.lot_no||'',stock_status:row.stock_status_name||row.stock_status||'',total_stock:Number(row.total_stock??row.stock_qty??0),available_stock:Number(row.available_stock??0),allocated_stock:Number(row.allocated_stock??row.unavailable_stock??0),category:inventoryCategory(row),updated_at:row.updated_at||data.generated_at||''}));state.inventoryUpdatedAt=data.response_date||data.generated_at||''}
async function loadPromotions(){const res=await fetch(`${API}?action=load&role=edit&t=${Date.now()}`,{cache:'no-store'});const data=await res.json();if(data.error)throw new Error(data.error);state.promotions=data.promotions||[];if(ROLE==='external')state.promotions=state.promotions.filter(p=>!EXTERNAL_HIDDEN_OWNERS.includes(String(p.owner||'').trim()))}
function currentPromoCodes(){const y=new Date().getFullYear(),m=new Date().getMonth(),first=toKey(new Date(y,m,1)),last=toKey(new Date(y,m+1,0)),codes=new Set();state.promotions.filter(p=>p.end_date>=first&&p.start_date<=last).forEach(p=>parseSku(p.product_name).forEach(row=>(row.items||[]).forEach(name=>findSkuMappings(name).forEach(m=>codes.add(m.inventory_product_code)))));return codes}
function buildInventorySummaryRows(){const groups=new Map();state.inventory.forEach(row=>{const key=[row.product_code,row.company_code,row.center].join('|');if(!groups.has(key))groups.set(key,{...row,total_stock:0,available_stock:0,allocated_stock:0,expiration_dates:[],lot_count:0});const g=groups.get(key);g.total_stock+=row.total_stock;g.available_stock+=row.available_stock;g.allocated_stock+=row.allocated_stock;if(row.expiration_date)g.expiration_dates.push(row.expiration_date);g.lot_count+=1});state.summaryRows=[...groups.values()].map(g=>{const vel=state.salesVelocity.get(g.product_code)||{},avg=Number(vel.avg14_daily)||0,days=avg>0?g.available_stock/avg:null;return {...g,expiration_date:g.expiration_dates.sort()[0]||'',recent7_qty:Math.round(Number(vel.recent7_qty)||0),recent14_qty:Math.round(Number(vel.recent14_qty)||0),recent30_qty:Math.round(Number(vel.recent30_qty)||0),avg14_daily:avg,days_left:days,mapped_products:vel.mapped_products||'',mapping_needs_review:!!vel.needs_review}})}
function riskBadge(item){const avg=Number(item.avg14_daily)||0,available=Number(item.available_stock)||0;if(avg<=0)return {text:item.mapped_products?'최근 출고 없음':'출고 매핑 없음',cls:item.mapped_products?'neutral':'review'};if(available/avg<21)return {text:'21일 미만',cls:'critical'};return {text:'안정',cls:'good'}}
function stockBadge(item){const available=Number(item.available_stock)||0;if(available<=0)return {text:'품절',cls:'bad'};if(available<100)return {text:'부족',cls:'warn'};return {text:'가용',cls:'good'}}
function syncCenters(){const sel=$('centerFilter'),cur=sel.value;const centers=[...new Set(state.summaryRows.map(x=>x.center).filter(Boolean))].sort();sel.innerHTML='<option value="all">전체</option>'+centers.map(c=>`<option value="${c}">${c}</option>`).join('');if([...sel.options].some(o=>o.value===cur))sel.value=cur}
function filteredRows(){const q=normText($('searchInput').value),stock=$('stockFilter').value,cat=$('categoryFilter').value,center=$('centerFilter').value,promoOnly=$('promoOnly').checked,reviewOnly=$('reviewOnly').checked,hideMaterial=$('hideMaterial').checked,promoCodes=promoOnly?currentPromoCodes():null;let rows=state.summaryRows.filter(item=>{const category=inventoryCategory(item);if(hideMaterial&&category==='부자재')return false;if(cat!=='all'&&category!==cat)return false;if(center!=='all'&&item.center!==center)return false;if(promoCodes&&!promoCodes.has(item.product_code))return false;if(reviewOnly&&!item.mapping_needs_review&&item.mapped_products)return false;if(q&&!normText([item.product_name,item.product_code,item.company_code,item.center,item.expiration_date,item.mapped_products].join(' ')).includes(q))return false;const available=Number(item.available_stock)||0,badge=riskBadge(item);if(stock==='risk21'&&badge.text!=='21일 미만')return false;if(stock==='unmapped'&&item.mapped_products)return false;if(stock==='low'&&!(available>0&&available<100))return false;if(stock==='out'&&available>0)return false;if(stock==='in'&&available<=0)return false;return true});rows.sort((a,b)=>{const av=a[state.sortKey],bv=b[state.sortKey];if(av==null&&bv==null)return 0;if(av==null)return 1;if(bv==null)return -1;if(typeof av==='number'||typeof bv==='number')return state.sortDir==='asc'?(Number(av)-Number(bv)):(Number(bv)-Number(av));return state.sortDir==='asc'?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av))});return rows}
function renderMappingDiagnostics(){const box=$('mappingAlert');if(state.mappingLoadError){box.className='mapping-alert';box.style.display='block';box.innerHTML=`<strong>sku_mapping 시트를 읽지 못해 계산을 중단했습니다.</strong><small>${state.mappingLoadError}</small>`;return}const unmapped=state.unmappedProducts||[];box.className='mapping-alert'+(unmapped.length?'':' ok');box.style.display='block';if(!unmapped.length){box.innerHTML=`<strong>sku_mapping ${num(state.mappingRows)}행 로드 완료.</strong><small>최근 30일 대시보드 출고 상품은 모두 시트 기준으로 매핑됐습니다.</small>`;return}const top=unmapped.slice(0,12).map(x=>`${x.product} (${num(x.recent30_qty)}개)`).join(' / ');box.innerHTML=`<strong>최근 30일 미매핑 대시보드 상품 ${num(unmapped.length)}개.</strong><small>${top}${unmapped.length>12?' ...':''}</small>`}
function render(){const rows=filteredRows();$('visibleCount').textContent=num(rows.length)+'개';$('availableTotal').textContent=num(rows.reduce((s,r)=>s+r.available_stock,0));$('riskCount').textContent=num(rows.filter(r=>riskBadge(r).text==='21일 미만').length)+'개';$('unmappedCount').textContent=num(rows.filter(r=>!r.mapped_products).length)+'개';$('velocityDate').textContent=state.velocityLatestDate||'-';$('updatedLabel').textContent=`재고 ${state.inventoryUpdatedAt||'-'} · 매핑 ${state.mappingSource} ${state.mappingRows?num(state.mappingRows)+'행':''}`;renderMappingDiagnostics();const body=$('tableBody'),empty=$('empty');body.innerHTML='';empty.style.display=rows.length?'none':'block';rows.forEach(item=>{const tr=document.createElement('tr'),risk=riskBadge(item),stock=stockBadge(item);if(risk.text==='21일 미만')tr.classList.add('risk');if(!item.mapped_products)tr.classList.add('unmapped');const cells=[{html:`<span class="badge">${inventoryCategory(item)}</span>`},{html:`${item.product_name}<small>${item.mapped_products?`매핑: ${item.mapped_products}`:'매핑 상품 없음'}${item.mapping_needs_review?' · 검토 필요':''}</small>`,cls:'product'},{text:item.product_code},{text:item.company_code},{text:item.center},{text:item.expiration_date||'-'},{text:num(item.available_stock),cls:'num'},{text:num(item.allocated_stock),cls:'num'},{text:num(item.recent7_qty),cls:'num'},{text:num(item.recent14_qty),cls:'num'},{text:num(item.recent30_qty),cls:'num'},{text:item.avg14_daily?item.avg14_daily.toFixed(1):'-',cls:'num'},{text:item.days_left==null?'-':item.days_left.toFixed(1),cls:'num'},{html:`<span class="badge ${risk.cls}">${risk.text}</span> <span class="badge ${stock.cls}">${stock.text}</span>`}];cells.forEach(c=>{const td=document.createElement('td');if(c.cls)td.className=c.cls;if(c.html)td.innerHTML=c.html;else td.textContent=c.text;tr.appendChild(td)});body.appendChild(tr)})}
async function refreshAll(){const btn=$('refreshButton');btn.disabled=true;$('loading').style.display='';try{state.mappingLoadError='';await Promise.all([loadInventory(),loadPromotions()]);await loadSalesVelocity();buildInventorySummaryRows();syncCenters();render()}catch(err){state.mappingLoadError=err.message||String(err);$('updatedLabel').textContent=`재고 ${state.inventoryUpdatedAt||'-'} · 매핑 오류`;renderMappingDiagnostics();alert('데이터 로드 실패: '+state.mappingLoadError)}finally{$('loading').style.display='none';btn.disabled=false}}
function applyRole(){if(!ACCESS_CODES || !ROLE_LABELS[ROLE])return;$('roleLabel').textContent=ROLE_LABELS[ROLE];$('accessGate').style.display='none';$('mainApp').style.display='';refreshAll()}
function handleAccessCode(){const role=ACCESS_CODES[$('accessCodeInput').value.trim()];if(!role){$('accessError').style.display='block';return}ROLE=role;localStorage.setItem('ourboxCalendarRole',ROLE);applyRole()}
$('accessCodeButton').onclick=handleAccessCode;$('accessCodeInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleAccessCode()});$('refreshButton').onclick=refreshAll;$('changeAccessButton').onclick=()=>{localStorage.removeItem('ourboxCalendarRole');ROLE='';$('mainApp').style.display='none';$('accessGate').style.display='flex';$('accessCodeInput').value='';$('accessCodeInput').focus()};$('resetButton').onclick=()=>{$('searchInput').value='';$('stockFilter').value='all';$('categoryFilter').value='all';$('centerFilter').value='all';$('promoOnly').checked=false;$('reviewOnly').checked=false;$('hideMaterial').checked=true;state.sortKey='days_left';state.sortDir='asc';$('sortSelect').value='days_left:asc';render()};['searchInput','stockFilter','categoryFilter','centerFilter','promoOnly','reviewOnly','hideMaterial'].forEach(id=>$(id).addEventListener('input',render));['stockFilter','categoryFilter','centerFilter','promoOnly','reviewOnly','hideMaterial'].forEach(id=>$(id).addEventListener('change',render));$('sortSelect').onchange=()=>{const [k,d]=$('sortSelect').value.split(':');state.sortKey=k;state.sortDir=d;render()};document.querySelectorAll('th[data-sort]').forEach(th=>th.onclick=()=>{const key=th.dataset.sort;if(state.sortKey===key)state.sortDir=state.sortDir==='asc'?'desc':'asc';else{state.sortKey=key;state.sortDir='asc'}$('sortSelect').value=`${state.sortKey}:${state.sortDir}`;render()});if(ROLE_LABELS[ROLE])applyRole();else $('accessCodeInput').focus();
</script>
</body>
