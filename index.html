<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OURBOX 프로모션 운영 캘린더 (편집)</title>
<style>
:root{
  --bg:#f6f7f9;--panel:#fff;--ink:#17202a;--muted:#667085;--line:#d8dee8;
  --soft:#eef2f7;--brand:#176b87;--brand-dark:#0f4f63;--green:#18864b;
  --orange:#c56514;--red:#b42318;--shadow:0 14px 40px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px}
button,input,select,textarea{font:inherit}button{cursor:pointer}
.app{min-height:100vh;padding:24px}
.topbar{display:grid;grid-template-columns:minmax(260px,1fr) auto;gap:16px;align-items:end;margin-bottom:18px}
.eyebrow{margin:0 0 6px;color:var(--brand-dark);font-size:13px;font-weight:800}
h1{margin:0;font-size:clamp(26px,3vw,40px);line-height:1.1}
.subcopy{margin:10px 0 0;color:var(--muted);line-height:1.5}
.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;align-items:center}
.month-control,.role-pill,.primary-button,.ghost-button{border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);min-height:38px;padding:8px 12px;font-weight:700}
.primary-button{border-color:var(--brand);background:var(--brand);color:#fff}
.ghost-button:hover,.month-control:hover{background:var(--soft)}
.action-strip{border:2px solid var(--orange);border-radius:8px;background:#fff7ed;padding:14px 18px;margin-bottom:14px;font-size:13px;line-height:1.6}
.action-strip strong{color:var(--orange);font-weight:900}
.action-strip em{font-style:normal;color:var(--red);font-weight:900}
.dashboard-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:14px}
.metric{min-height:96px;border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:14px;box-shadow:var(--shadow)}
.metric-label{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:13px;font-weight:700}
.metric-value{margin-top:10px;font-size:26px;font-weight:900}
.metric-note{margin-top:6px;color:var(--muted);font-size:12px}
.calendar-shell{overflow-x:auto;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow)}
.calendar-grid{min-width:900px;display:grid;grid-template-columns:repeat(7,minmax(92px,1fr)) 170px}
.day-header,.week-header{position:sticky;top:0;z-index:2;min-height:44px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#fbfcfe;padding:12px 10px;font-size:13px;font-weight:900;text-align:center}
.week-header{border-right:0;background:#eef6f8;color:var(--brand-dark)}
.day-cell{min-height:130px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff;padding:5px 2px 5px 6px;position:relative;overflow:visible}
.day-cell:hover{background:#fafcfd}
.day-cell.outside{background:#f2f4f7;color:#98a2b3}
.day-cell.today .date-number{background:var(--brand);color:#fff}
.date-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.date-number{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:900}
.promo-slot{height:24px;margin:1px 0;position:relative}
.promo-bar{position:absolute;top:2px;bottom:2px;left:0;right:3px;border-radius:5px;padding:0 6px;display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:#fff;cursor:pointer;overflow:hidden;white-space:nowrap;transition:filter .15s}
.promo-bar:hover{filter:brightness(1.12)}
.promo-bar.start{border-radius:6px 0 0 6px;right:-2px}
.promo-bar.middle{border-radius:0;left:-2px;right:-2px}
.promo-bar.end{border-radius:0 6px 6px 0;left:-2px}
.promo-bar.single{border-radius:6px}
.promo-bar.start.end{border-radius:6px;right:4px}
.bar-title{flex:1;overflow:hidden;text-overflow:ellipsis}
.bar-qty{font-size:9.5px;opacity:.85;flex-shrink:0}
.week-total{min-height:130px;border-bottom:1px solid var(--line);background:#f2faf9;padding:8px;font-size:10.5px;line-height:1.4;overflow-y:auto;max-height:300px}
.week-total-head{font-weight:900;color:var(--brand-dark);font-size:11.5px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline;gap:14px}
.week-total-sum{color:var(--brand-dark);font-weight:900;font-size:13px}
.week-promo{margin-bottom:14px;padding-bottom:10px;border-bottom:1px dashed #d3e3e6}
.week-promo:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0}
.week-promo-name{font-weight:800;color:var(--ink);margin-bottom:4px;font-size:11px}
.week-promo-sku{color:var(--muted);font-size:10.5px;line-height:1.45;padding-left:3px}
.week-total-empty{color:var(--muted);font-size:12px}
.modal-backdrop{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.48);padding:20px}
.modal-backdrop.open{display:flex}
.modal{width:min(920px,100%);max-height:calc(100vh - 40px);overflow:auto;border-radius:8px;background:var(--panel);box-shadow:0 24px 80px rgba(15,23,42,.24)}
.modal-header{display:flex;justify-content:space-between;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding:18px 20px}
.modal-header h2{margin:0;font-size:20px}
.close-button{width:36px;height:36px;border:1px solid var(--line);border-radius:50%;background:#fff;font-size:20px;line-height:1}
form{padding:20px}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
label{display:grid;gap:7px;color:var(--muted);font-size:13px;font-weight:800}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:10px 11px}
textarea{min-height:80px;resize:vertical}
.full{grid-column:1/-1}
.form-actions{display:flex;justify-content:space-between;gap:8px;border-top:1px solid var(--line);margin:18px -20px -20px;padding:16px 20px;background:#fbfcfe}
.sku-section{grid-column:1/-1}
.sku-section-label{color:var(--muted);font-size:13px;font-weight:800;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.sku-section-label .hint{color:var(--muted);font-weight:600;font-size:12px}
.sku-rows{display:flex;flex-direction:column;gap:10px}
.sku-row{display:flex;align-items:center;gap:8px;padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--soft);flex-wrap:wrap}
.sku-row-num{flex:0 0 24px;height:24px;border-radius:50%;background:var(--brand);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center}
.sku-items{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0}
.sku-item-select{min-width:160px;flex:1}
.sku-item-plus{color:var(--muted);font-weight:900;font-size:14px;flex:0 0 auto}
.sku-add-bundle{flex:0 0 auto;border:1px dashed var(--line);border-radius:6px;background:#fff;color:var(--muted);font-size:11px;padding:7px 10px;font-weight:700;white-space:nowrap}
.sku-add-bundle:hover{border-color:var(--brand);color:var(--brand)}
.sku-item-remove{flex:0 0 auto;width:22px;height:22px;border:none;border-radius:50%;background:#fff;color:var(--muted);font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.sku-item-remove:hover{background:var(--red);color:#fff}
.sku-qty-group{flex:0 0 auto;display:flex;gap:4px;align-items:center}
.sku-qty-display{width:80px;text-align:center;border:1px solid var(--line);border-radius:6px;padding:7px 8px;background:#fff;font-weight:900;font-size:13px}
  .sku-qty-display::-webkit-inner-spin-button,
.sku-qty-display::-webkit-outer-spin-button{
  opacity:1;
}
.sku-qty-btn{border:1px solid var(--brand);border-radius:6px;background:#fff;color:var(--brand);font-weight:900;padding:6px 9px;font-size:11px;white-space:nowrap}
.sku-qty-btn:hover{background:var(--brand);color:#fff}
.sku-qty-reset{border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--muted);padding:6px 8px;font-size:11px;font-weight:700}
.sku-qty-reset:hover{border-color:var(--red);color:var(--red)}
.sku-row-remove{flex:0 0 auto;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--muted);padding:6px 9px;font-size:11px;font-weight:700}
.sku-row-remove:hover{border-color:var(--red);color:var(--red);background:#fff5f5}
.sku-add-row{margin-top:8px;border:2px dashed var(--line);border-radius:8px;background:#fff;color:var(--muted);font-weight:700;padding:10px;font-size:13px;width:100%}
.sku-add-row:hover{border-color:var(--brand);color:var(--brand)}
