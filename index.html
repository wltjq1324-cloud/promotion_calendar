<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OURBOX 프로모션 운영 캘린더</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f6f7f9}
#calendarFrame{width:100%;height:100%;border:0;display:block}
</style>
</head>
<body>
<iframe id="calendarFrame" src="./calendar-base.html" title="OURBOX 프로모션 운영 캘린더"></iframe>
<script>
const INVENTORY_URL='./inventory-latest.json';
const frame=document.getElementById('calendarFrame');

function installNaverLabelPatch(doc){
  if(!doc||doc.getElementById('naverChannelLabelPatch'))return;
  const script=doc.createElement('script');
  script.id='naverChannelLabelPatch';
  script.textContent=`(()=>{
    if(window.__naverChannelLabelPatch)return;
    window.__naverChannelLabelPatch=true;
    const clean=text=>String(text||'').replace(/\s/g,'').trim();
    const isNaver=p=>String((p&&p.channel)||'').trim()==='네이버';
    const apply=()=>{
      try{
        if(typeof ROLE==='undefined'||ROLE!=='external'||typeof state==='undefined')return;
        (state.promotions||[]).forEach(p=>{
          if(!isNaver(p))return;
          document.querySelectorAll('[data-promo-id]').forEach(bar=>{
            if(bar.dataset.promoId!==String(p.id))return;
            const title=bar.querySelector('.bar-title');
            if(title&&clean(title.textContent)==='출고예정')title.textContent='네이버 출고예정';
          });
        });
        if(typeof getWeeks!=='function'||typeof getPromoSkuInWeek!=='function'||typeof toKey!=='function')return;
        const weeks=getWeeks(state.visibleDate.getFullYear(),state.visibleDate.getMonth());
        document.querySelectorAll('.week-total').forEach((box,wi)=>{
          const week=weeks[wi];
          if(!week)return;
          const names=box.querySelectorAll('.week-promo-name');
          let nameIndex=0;
          (state.promotions||[]).filter(p=>week.some(d=>{const k=toKey(d);return p.start_date<=k&&p.end_date>=k})).forEach(p=>{
            const skus=getPromoSkuInWeek(p,week);
            if(!skus||!skus.length)return;
            const name=names[nameIndex++];
            if(name&&isNaver(p)&&clean(name.textContent)==='[출고항목]')name.textContent='[네이버 출고항목]';
          });
        });
      }catch(err){}
    };
    const wrap=()=>{
      if(typeof renderCalendar!=='function')return false;
      if(renderCalendar.__naverChannelLabelPatch){apply();return true;}
      const originalRenderCalendar=renderCalendar;
      renderCalendar=function(){const result=originalRenderCalendar.apply(this,arguments);apply();return result;};
      renderCalendar.__naverChannelLabelPatch=true;
      apply();
      return true;
    };
    if(!wrap()){
      let tries=0;
      const timer=setInterval(()=>{if(wrap()||++tries>30)clearInterval(timer)},200);
    }
  })();`;
  doc.body.appendChild(script);
}

function installInventory(doc,win){
  if(!doc||doc.getElementById('inventoryButton'))return;
  const nextMonth=doc.getElementById('nextMonth');
  if(!nextMonth)return;
  const style=doc.createElement('style');
  style.id='inventoryStyle';
  style.textContent=`
    .inventory-modal{width:min(1180px,100%)}
    .inventory-actions{display:flex;align-items:center;gap:8px}.inventory-refresh-button{border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--brand-dark);font-weight:900;padding:10px 12px;cursor:pointer}.inventory-refresh-button:hover{background:#eef6f8}.inventory-refresh-button:disabled{opacity:.55;cursor:wait}
    .inventory-toolbar{display:grid;grid-template-columns:2fr repeat(3,minmax(130px,1fr));gap:10px;padding:16px 20px;border-bottom:1px solid var(--line);background:#fbfcfe}.inventory-toolbar label{gap:5px}.inventory-checks{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:12px;color:var(--muted);font-weight:800}.inventory-checks label{display:flex;grid-auto-flow:column;align-items:center;gap:6px}.inventory-checks input{width:auto}
    .inventory-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:14px 20px;border-bottom:1px solid var(--line)}.inventory-kpi{border:1px solid var(--line);border-radius:8px;background:#fff;padding:10px 12px}.inventory-kpi span{display:block;color:var(--muted);font-size:11px;font-weight:800}.inventory-kpi strong{display:block;margin-top:5px;font-size:20px;font-weight:900;color:var(--brand-dark)}
    .inventory-table-wrap{max-height:58vh;overflow:auto}.inventory-table{width:100%;border-collapse:collapse;font-size:12px}.inventory-table th,.inventory-table td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;vertical-align:top;white-space:nowrap}.inventory-table th{position:sticky;top:0;z-index:1;background:#eef6f8;color:var(--brand-dark);font-weight:900}.inventory-table th.sortable{cursor:pointer;user-select:none}.inventory-table th.sortable:hover{background:#dff0f4}.inventory-table th.sortable span{display:inline-flex;align-items:center;gap:4px}.inventory-table td.product-cell{white-space:normal;min-width:280px;font-weight:800;color:var(--ink)}.inventory-table .num-cell{text-align:right;font-weight:900}
    .inventory-badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900;background:#eef2f7;color:var(--muted)}.inventory-badge.good{background:#eaf7ee;color:var(--green)}.inventory-badge.warn{background:#fff7ed;color:var(--orange)}.inventory-badge.bad{background:#fff1f0;color:var(--red)}.inventory-empty{padding:32px 20px;text-align:center;color:var(--muted);font-weight:800}.inventory-updated{color:var(--muted);font-size:12px;font-weight:700}
    @media(max-width:720px){.inventory-toolbar{grid-template-columns:1fr}.inventory-summary{grid-template-columns:repeat(2,minmax(0,1fr))}}
  `;
  doc.head.appendChild(style);
  const button=doc.createElement('button');
  button.className='ghost-button';
  button.id='inventoryButton';
  button.type='button';
  button.textContent='재고조회';
  nextMonth.insertAdjacentElement('afterend',button);
  doc.body.insertAdjacentHTML('beforeend',`
    <div class="modal-backdrop" id="inventoryBackdrop"><section class="modal inventory-modal">
      <div class="modal-header"><div><h2>재고조회</h2><div class="inventory-updated" id="inventoryUpdated">최신 재고를 불러오는 중...</div></div><div class="inventory-actions"><button class="inventory-refresh-button" id="refreshInventoryButton" type="button">새로고침</button><button class="close-button" id="closeInventoryButton">×</button></div></div>
      <div class="inventory-toolbar"><label>검색<input id="inventorySearchInput" placeholder="상품명, 상품코드, 업체 품목코드"></label><label>재고 상태<select id="inventoryStockFilter"><option value="all">전체</option><option value="in">재고 있음</option><option value="low">100개 미만</option><option value="out">품절</option></select></label><label>구분<select id="inventoryCategoryFilter"><option value="all">전체</option><option value="판매상품">판매상품</option><option value="증정품">증정품</option><option value="부자재">부자재</option><option value="세트">세트</option></select></label><label>센터<select id="inventoryCenterFilter"><option value="all">전체</option></select></label><div class="inventory-checks"><label><input id="inventoryHideMaterial" type="checkbox" checked> 부자재 제외</label><label><input id="inventoryPromoOnly" type="checkbox"> 현재 달 프로모션 품목만</label></div></div>
      <div class="inventory-summary"><div class="inventory-kpi"><span>표시 품목</span><strong id="inventoryVisibleCount">-</strong></div><div class="inventory-kpi"><span>총 재고</span><strong id="inventoryTotalStock">-</strong></div><div class="inventory-kpi"><span>가용 재고</span><strong id="inventoryAvailableStock">-</strong></div><div class="inventory-kpi"><span>부족/품절</span><strong id="inventoryRiskCount">-</strong></div></div>
      <div class="inventory-table-wrap"><table class="inventory-table"><thead><tr><th>구분</th><th>상품명</th><th>상품코드</th><th>업체 품목코드</th><th>센터</th><th>소비기한</th><th>로트번호</th><th>배치번호</th><th>재고상태</th><th class="sortable" data-sort-key="total_stock"><span>재고 <b id="sortIcon_total_stock"></b></span></th><th class="sortable" data-sort-key="available_stock"><span>가용 <b id="sortIcon_available_stock"></b></span></th><th class="sortable" data-sort-key="allocated_stock"><span>할당 <b id="sortIcon_allocated_stock"></b></span></th></tr></thead><tbody id="inventoryTableBody"></tbody></table><div class="inventory-empty" id="inventoryEmpty" style="display:none">조건에 맞는 재고가 없습니다.</div></div>
    </section></div>`);
  let items=[],updatedAt='',sortState={key:'',dir:'desc'};
  const $=id=>doc.getElementById(id),num=v=>Number(v||0).toLocaleString('ko-KR'),raw=v=>String(v||'').toLowerCase().trim();
  const norm=v=>String(v||'').toLowerCase().replace(/\[[^\]]+\]/g,'').replace(/감자밭|밭\(주\)|파머스베이크샵/g,'').replace(/[^0-9a-z가-힣]/g,'');
  const category=item=>item.category||'판매상품';
  const searchable=item=>[item.product_name,item.product_code,item.company_code,item.barcode,item.expiration_date,item.lot_no,item.batch_no,item.search_key,category(item)].join(' ');
  const matchesSearch=(item,q)=>!q||raw(searchable(item)).includes(raw(q))||norm(searchable(item)).includes(norm(q));
  const badge=item=>{const available=Number(item.available_stock)||0;if(available<=0)return{text:'품절',cls:'bad'};if(available<100)return{text:'부족',cls:'warn'};return{text:'가용',cls:'good'}};
  const promoNames=()=>{if(typeof win.getVisiblePromotions!=='function'||typeof win.parseSku!=='function')return[];const names=new Set();win.getVisiblePromotions().forEach(p=>win.parseSku(p.product_name).forEach(row=>(row.items||[]).forEach(name=>names.add(norm(name)))));return[...names].filter(Boolean)};
  const isPromoItem=(item,names)=>{const hay=norm([item.product_name,item.product_code,item.company_code].join(' '));return names.some(name=>hay.includes(name)||name.includes(hay))};
  const filtered=()=>{const q=$('inventorySearchInput').value,stock=$('inventoryStockFilter').value,cat=$('inventoryCategoryFilter').value,center=$('inventoryCenterFilter').value,hideMaterial=$('inventoryHideMaterial').checked,promoOnly=$('inventoryPromoOnly').checked,names=promoOnly?promoNames():[];return items.filter(item=>{const itemCat=category(item),available=Number(item.available_stock)||0;if(hideMaterial&&itemCat==='부자재')return false;if(cat!=='all'&&itemCat!==cat)return false;if(center!=='all'&&item.center!==center)return false;if(!matchesSearch(item,q))return false;if(stock==='in'&&available<=0)return false;if(stock==='low'&&!(available>0&&available<100))return false;if(stock==='out'&&available>0)return false;if(promoOnly&&!isPromoItem(item,names))return false;return true}).sort((a,b)=>{if(!sortState.key)return 0;const av=Number(a[sortState.key]||0),bv=Number(b[sortState.key]||0);return sortState.dir==='asc'?av-bv:bv-av})};
  const renderSortIcons=()=>['total_stock','available_stock','allocated_stock'].forEach(key=>{const el=$(`sortIcon_${key}`);if(el)el.textContent=sortState.key===key?(sortState.dir==='asc'?'▲':'▼'):''});
  const render=()=>{const rows=filtered();renderSortIcons();$('inventoryUpdated').textContent=updatedAt?`최종 갱신: ${updatedAt}`:'최종 갱신 정보 없음';$('inventoryVisibleCount').textContent=num(rows.length)+'개';$('inventoryTotalStock').textContent=num(rows.reduce((s,r)=>s+Number(r.total_stock||0),0));$('inventoryAvailableStock').textContent=num(rows.reduce((s,r)=>s+Number(r.available_stock||0),0));$('inventoryRiskCount').textContent=num(rows.filter(r=>Number(r.available_stock||0)<100).length)+'개';$('inventoryTableBody').innerHTML='';$('inventoryEmpty').style.display=rows.length?'none':'';rows.forEach(item=>{const b=badge(item),tr=doc.createElement('tr');[`<span class="inventory-badge">${category(item)}</span>`,item.product_name||'',item.product_code||'',item.company_code||'',item.center||'',item.expiration_date||'-',item.lot_no||'-',item.batch_no||'-',`<span class="inventory-badge ${b.cls}">${b.text}</span>`,num(item.total_stock),num(item.available_stock),num(item.allocated_stock)].forEach((value,index)=>{const td=doc.createElement('td');if(index===1)td.className='product-cell';if(index>=9)td.className='num-cell';td.innerHTML=value;tr.appendChild(td)});$('inventoryTableBody').appendChild(tr)})};
  const syncCenters=()=>{const select=$('inventoryCenterFilter'),current=select.value;[...select.querySelectorAll('option:not([value="all"])')].forEach(option=>option.remove());[...new Set(items.map(x=>x.center).filter(Boolean))].sort().forEach(center=>{const opt=doc.createElement('option');opt.value=opt.textContent=center;select.appendChild(opt)});select.value=[...select.options].some(option=>option.value===current)?current:'all'};
  const loadInventory=async()=>{$('inventoryBackdrop').classList.add('open');$('inventoryUpdated').textContent='최신 재고를 불러오는 중...';$('refreshInventoryButton').disabled=true;try{const res=await fetch(`${INVENTORY_URL}?t=${Date.now()}`);if(!res.ok)throw new Error('재고 파일을 불러오지 못했습니다.');const data=await res.json();items=Array.isArray(data.items)?data.items:[];updatedAt=data.response_date||data.generated_at||'';syncCenters();render()}catch(err){items=[];render();$('inventoryUpdated').textContent='오류: '+err.message}finally{$('refreshInventoryButton').disabled=false}};
  button.addEventListener('click',loadInventory);$('refreshInventoryButton').addEventListener('click',loadInventory);$('closeInventoryButton').addEventListener('click',()=>$('inventoryBackdrop').classList.remove('open'));
  doc.querySelectorAll('.inventory-table th.sortable').forEach(th=>th.addEventListener('click',()=>{const key=th.dataset.sortKey;sortState={key,dir:sortState.key===key&&sortState.dir==='desc'?'asc':'desc'};render()}));
  ['inventorySearchInput','inventoryStockFilter','inventoryCategoryFilter','inventoryCenterFilter','inventoryHideMaterial','inventoryPromoOnly'].forEach(id=>{$(id).addEventListener('input',render);$(id).addEventListener('change',render)});
}

frame.addEventListener('load',()=>{
  const apply=()=>{
    const doc=frame.contentDocument,win=frame.contentWindow;
    if(!doc)return;
    installNaverLabelPatch(doc);
    installInventory(doc,win);
  };
  apply();
  let tries=0;
  const timer=setInterval(()=>{apply();if(++tries>20||frame.contentDocument?.getElementById('inventoryButton'))clearInterval(timer)},300);
});
</script>
</body>
</html>
